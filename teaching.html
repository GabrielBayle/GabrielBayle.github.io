<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teaching — Gabriel Bayle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2a2a2a;
      --primary-light: #3d3d3d;
      --accent: #c8a96e;
      --accent-light: #f0e6d2;
      --text: #1e2030;
      --muted: #6b7280;
      --bg: #faf9f7;
      --white: #ffffff;
      --border: #e5e0d8;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav { background: var(--primary); position: sticky; top: 0; z-index: 100; padding: 0 2rem; }
    .nav-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .nav-logo { font-family: 'Lora', serif; font-size: 1.1rem; color: var(--white); text-decoration: none; letter-spacing: 0.01em; }
    .nav-links { display: flex; gap: 0.25rem; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.85rem; padding: 0.4rem 0.75rem; border-radius: 4px; transition: all 0.2s; }
    .nav-links a:hover { color: var(--white); background: rgba(255,255,255,0.1); }
    .nav-links a.active { color: var(--accent); }

    .page-header { background: var(--primary); padding: 3rem 2rem; }
    .page-header h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--white); max-width: 1000px; margin: 0 auto; font-weight: 500; }

    main { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

    .section-block { margin-bottom: 2.5rem; }
    .section-title {
      font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 500; color: var(--primary);
      margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--accent-light);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .section-title::before { content: ''; display: inline-block; width: 4px; height: 1.1em; background: var(--accent); border-radius: 2px; }

    /* COURSE CARD */
    .course-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.8rem;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .course-card:hover { border-color: #c5c0b8; }

    .course-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      cursor: pointer;
      gap: 1rem;
    }
    .course-header-left { flex: 1; min-width: 0; }
    .course-title {
      font-family: 'Lora', serif; font-size: 1rem; font-weight: 500;
      color: var(--text); line-height: 1.4; margin-bottom: 0.25rem;
    }
    .course-meta { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .course-level {
      font-size: 0.78rem; color: var(--muted);
    }
    .course-years {
      font-size: 0.75rem; padding: 0.15rem 0.55rem;
      background: var(--accent-light); color: #7a5a20;
      border-radius: 20px; font-weight: 500; white-space: nowrap;
    }
    .course-toggle {
      width: 24px; height: 24px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s; color: var(--muted);
      font-size: 0.7rem;
    }
    .course-card.open .course-toggle { background: var(--primary); border-color: var(--primary); color: var(--white); transform: rotate(180deg); }

    .course-body {
      display: none;
      padding: 0 1.5rem 1.25rem;
      border-top: 1px solid var(--border);
    }
    .course-card.open .course-body { display: block; }
    .course-context {
      font-size: 0.82rem; color: var(--muted); font-style: italic;
      padding: 0.75rem 0 0.6rem; line-height: 1.6;
    }
    .course-description {
      font-size: 0.9rem; color: var(--text); line-height: 1.8;
    }

    footer { border-top: 1px solid var(--border); padding: 1.5rem 2rem; text-align: center; font-size: 0.8rem; color: var(--muted); }

    @media (max-width: 700px) { .nav-links { display: none; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Gabriel Bayle</a>
    <ul class="nav-links">
      <li><a href="index.html">Welcome</a></li>
      <li><a href="research.html">Research</a></li>
      <li><a href="teaching.html" class="active">Teaching</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="cv.html">CV</a></li>
      <li><a href="references.html">References</a></li>
    </ul>
  </div>
</nav>

<section class="page-header"><h1>Teaching</h1></section>

<main>
  <div id="teaching-container"></div>
</main>

<footer>Last update: 09/01/2026 · Gabriel Bayle</footer>

<script src="teaching.js"></script>
<script>
  const container = document.getElementById('teaching-container');

  Object.entries(ROLES).forEach(([roleKey, roleDef]) => {
    const courses = COURSES.filter(c => c.role === roleKey);
    if (courses.length === 0) return;

    const block = document.createElement('div');
    block.className = 'section-block';

    const heading = document.createElement('h2');
    heading.className = 'section-title';
    heading.textContent = roleDef.label;
    block.appendChild(heading);

    courses.forEach(course => {
      const card = document.createElement('div');
      card.className = 'course-card';

      // Header (clickable)
      const header = document.createElement('div');
      header.className = 'course-header';

      const left = document.createElement('div');
      left.className = 'course-header-left';

      const title = document.createElement('div');
      title.className = 'course-title';
      title.textContent = course.title;

      const meta = document.createElement('div');
      meta.className = 'course-meta';

      const level = document.createElement('span');
      level.className = 'course-level';
      level.textContent = course.level;

      const years = document.createElement('span');
      years.className = 'course-years';
      years.textContent = course.years;

      meta.appendChild(level);
      meta.appendChild(years);
      left.appendChild(title);
      left.appendChild(meta);

      const toggle = document.createElement('div');
      toggle.className = 'course-toggle';
      toggle.innerHTML = '&#9660;';

      header.appendChild(left);
      header.appendChild(toggle);

      // Body (expandable)
      const body = document.createElement('div');
      body.className = 'course-body';

      if (course.context) {
        const ctx = document.createElement('div');
        ctx.className = 'course-context';
        ctx.textContent = course.context;
        body.appendChild(ctx);
      }

      const desc = document.createElement('div');
      desc.className = 'course-description';
      desc.innerHTML = course.description;
      body.appendChild(desc);

      card.appendChild(header);
      card.appendChild(body);

      // Toggle open/close
      header.addEventListener('click', () => {
        card.classList.toggle('open');
      });

      block.appendChild(card);
    });

    container.appendChild(block);
  });
</script>
</body>
</html>
