<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>References — Gabriel Bayle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2a2a2a;
      --primary-light: #3d3d3d;
      --accent: #c8a96e;
      --accent-light: #f0e6d2;
      --text: #1e2030;
      --muted: #6b7280;
      --bg: #faf9f7;
      --white: #ffffff;
      --border: #e5e0d8;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav { background: var(--primary); position: sticky; top: 0; z-index: 100; padding: 0 2rem; }
    .nav-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .nav-logo { font-family: 'Lora', serif; font-size: 1.1rem; color: var(--white); text-decoration: none; letter-spacing: 0.01em; }
    .nav-links { display: flex; gap: 0.25rem; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.85rem; padding: 0.4rem 0.75rem; border-radius: 4px; transition: all 0.2s; }
    .nav-links a:hover { color: var(--white); background: rgba(255,255,255,0.1); }
    .nav-links a.active { color: var(--accent); }

    .page-header { background: var(--primary); padding: 3rem 2rem; }
    .page-header h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--white); max-width: 1000px; margin: 0 auto; font-weight: 500; }

    main { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

    .section-title {
      font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 500; color: var(--primary);
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent-light);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .section-title::before { content: ''; display: inline-block; width: 4px; height: 1.1em; background: var(--accent); border-radius: 2px; }

    .ref-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .ref-card {
      background: var(--white); border: 1px solid var(--border); border-radius: 10px;
      padding: 1.25rem 1.5rem; transition: border-color 0.15s;
    }
    .ref-card:hover { border-color: #c5c0b8; }
    .ref-initials {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent-light); color: #7a5a20;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Lora', serif; font-size: 0.9rem; font-weight: 500;
      margin-bottom: 0.75rem; flex-shrink: 0;
    }
    .ref-name { font-family: 'Lora', serif; font-size: 1rem; font-weight: 500; color: var(--text); margin-bottom: 0.15rem; }
    .ref-title { font-size: 0.78rem; color: var(--accent); font-weight: 500; margin-bottom: 0.15rem; }
    .ref-affil { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.75rem; line-height: 1.5; }
    .ref-link {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.78rem; color: var(--primary); text-decoration: none;
      padding: 0.2rem 0.6rem; border: 1px solid var(--border); border-radius: 4px;
      transition: all 0.15s; font-weight: 500;
    }
    .ref-link:hover { background: var(--accent-light); border-color: var(--accent); }

    footer { border-top: 1px solid var(--border); padding: 1.5rem 2rem; text-align: center; font-size: 0.8rem; color: var(--muted); }

    @media (max-width: 600px) { .ref-grid { grid-template-columns: 1fr; } .nav-links { display: none; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Gabriel Bayle</a>
    <ul class="nav-links">
      <li><a href="index.html">Welcome</a></li>
      <li><a href="research.html">Research</a></li>
      <li><a href="teaching.html">Teaching</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="cv.html">CV</a></li>
      <li><a href="references.html" class="active">References</a></li>
      <li><a href="explain.html">EXPLAIN</a></li>
    </ul>
  </div>
</nav>

<section class="page-header">
  <h1>References</h1>
</section>

<main>
  <h2 class="section-title">Academic references</h2>
  <div class="ref-grid" id="ref-grid"></div>
</main>

<footer>Last update: 09/01/2026 · Gabriel Bayle</footer>

<script src="references.js"></script>
<script>
  const grid = document.getElementById('ref-grid');

  REFERENCES.forEach(r => {
    const initials = r.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

    const card = document.createElement('div');
    card.className = 'ref-card';
    card.innerHTML = `
      <div class="ref-initials">${initials}</div>
      <div class="ref-name">${r.name}</div>
      <div class="ref-title">${r.title}</div>
      <div class="ref-affil">${r.affiliation}</div>
      ${r.website ? `<a class="ref-link" href="${r.website}" target="_blank">Website ↗</a>` : ''}
    `;
    grid.appendChild(card);
  });
</script>
</body>
</html>
