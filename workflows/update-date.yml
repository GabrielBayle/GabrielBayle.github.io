name: Update last modified date

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'

jobs:
  update-date:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Update date in HTML files
        run: |
          DATE=$(date +'%d/%m/%Y')
          for file in *.html; do
            sed -i "s|Last update: [0-9][0-9]/[0-9][0-9]/[0-9][0-9][0-9][0-9]|Last update: $DATE|g" "$file"
          done

      - name: Commit updated date
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add *.html && git commit -m "chore: update last modified date [skip ci]" && git push)
