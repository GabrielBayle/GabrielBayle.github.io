name: Update last modified date

on:
  push:
    branches: [main]

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update date in HTML files
        run: |
          DATE=$(date +'%d/%m/%Y')
          for file in *.html; do
            sed -i "s|Last update: [0-9][0-9]/[0-9][0-9]/[0-9][0-9][0-9][0-9]|Last update: $DATE|g" "$file"
          done

      - name: Commit updated date
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git diff --quiet || (git add *.html && git commit -m "Update last modified date" && git push)
